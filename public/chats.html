<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chats Viewer</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial,
          sans-serif;
      }
      body {
        margin: 24px;
      }
      header {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      input,
      button,
      select {
        padding: 8px 10px;
        font-size: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
        gap: 14px;
      }
      .card {
        border: 1px solid #e3e3e3;
        border-radius: 12px;
        padding: 12px;
        background: #fff;
      }
      .meta {
        font-size: 12px;
        color: #666;
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      .sid {
        font-weight: 600;
      }
      .src {
        font-size: 12px;
        color: #444;
        margin-top: 6px;
      }
      .messages {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 420px;
        overflow: auto;
      }
      .msg {
        border: 1px solid #f0f0f0;
        border-radius: 10px;
        padding: 10px;
        background: #fafafa;
      }
      .role {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        opacity: 0.7;
      }
      .content {
        white-space: pre-wrap;
        margin-top: 6px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-left: auto;
      }
      .empty {
        opacity: 0.6;
        padding: 12px;
      }
      .err {
        background: #fff3f3;
        border: 1px solid #ffd1d1;
        color: #b60000;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 style="margin: 0">Chats</h1>
      <div class="toolbar">
        <label
          >Limit:
          <input
            id="limit"
            type="number"
            min="1"
            max="200"
            value="50"
            style="width: 80px"
          />
        </label>
        <input
          id="filter"
          type="text"
          placeholder="Filter by session_id or text…"
          style="min-width: 260px"
        />
        <select id="lastN">
          <option value="0">Show full messages</option>
          <option value="3">Show last 3</option>
          <option value="5">Show last 5</option>
          <option value="10">Show last 10</option>
        </select>
        <button id="refresh">Refresh</button>
        <button id="auto">Auto: Off</button>
      </div>
    </header>

    <div id="err"></div>
    <div id="stats" class="empty">Loading…</div>
    <div id="grid" class="grid"></div>

    <script>
      // Adjust this if your router is mounted at /api
      const API_URL = "api/chats"; // or '/api/chats'

      const els = {
        grid: document.getElementById("grid"),
        stats: document.getElementById("stats"),
        err: document.getElementById("err"),
        limit: document.getElementById("limit"),
        filter: document.getElementById("filter"),
        refresh: document.getElementById("refresh"),
        auto: document.getElementById("auto"),
        lastN: document.getElementById("lastN"),
      };

      let autoTimer = null;
      let cache = [];

      function esc(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function fmtDate(iso) {
        try {
          const d = new Date(iso);
          return d.toLocaleString();
        } catch {
          return iso;
        }
      }

      async function load() {
        els.err.innerHTML = "";
        const limit = Math.min(
          Math.max(parseInt(els.limit.value || "50", 10), 1),
          200
        );
        const url = `${API_URL}?limit=${encodeURIComponent(limit)}`;
        try {
          const r = await fetch(url, {
            headers: { Accept: "application/json" },
          });
          const data = await r.json();
          if (!r.ok || !data.ok)
            throw new Error(data.error || `HTTP ${r.status}`);
          cache = data.chats || [];
          render();
        } catch (e) {
          console.error(e);
          els.err.innerHTML = `<div class="err">Failed to load chats: ${esc(
            e.message
          )}</div>`;
          els.stats.textContent = "—";
          els.grid.innerHTML = "";
        }
      }

      function render() {
        const q = els.filter.value.trim().toLowerCase();
        const lastN = parseInt(els.lastN.value, 10) || 0;

        let list = cache;
        if (q) {
          list = cache.filter((c) => {
            const src = c.source || {};
            return (
              c.session_id.toLowerCase().includes(q) ||
              (src.name && String(src.name).toLowerCase().includes(q)) ||
              (src.platform &&
                String(src.platform).toLowerCase().includes(q)) ||
              (src.contact && String(src.contact).toLowerCase().includes(q)) ||
              (c.messages || []).some(
                (m) =>
                  (m.role && m.role.toLowerCase().includes(q)) ||
                  (m.content && m.content.toLowerCase().includes(q))
              )
            );
          });
        }

        els.stats.textContent = `Showing ${list.length} of ${cache.length} chats`;

        if (!list.length) {
          els.grid.innerHTML = `<div class="empty">No chats found.</div>`;
          return;
        }

        const html = list
          .map((c) => {
            const src = c.source || {};
            const msgs = Array.isArray(c.messages)
              ? lastN > 0
                ? c.messages.slice(-lastN)
                : c.messages
              : [];
            const msgsHtml = msgs
              .map(
                (m) => `
    <div class="msg">
      <div class="role">${esc(m.role || "")}</div>
      <div class="content">${esc(m.content || "")}</div>
    </div>
  `
              )
              .join("");
            return `
    <div class="card">
      <div class="meta">
        <div class="sid">Session: ${esc(c.session_id)}</div>
        <div>${esc(fmtDate(c.created_at))}</div>
      </div>
      <div class="src">From: ${esc(src.name || "—")} • ${esc(
              src.platform || "—"
            )} • ${esc(src.contact || "—")}</div>
      <div class="messages">${
        msgsHtml || '<div class="empty">No messages</div>'
      }</div>
    </div>
  `;
          })
          .join("");

        els.grid.innerHTML = html;
      }

      // Events
      els.refresh.addEventListener("click", load);
      els.limit.addEventListener("change", load);
      els.filter.addEventListener("input", render);
      els.lastN.addEventListener("change", render);

      els.auto.addEventListener("click", () => {
        if (autoTimer) {
          clearInterval(autoTimer);
          autoTimer = null;
          els.auto.textContent = "Auto: Off";
        } else {
          autoTimer = setInterval(load, 5000);
          els.auto.textContent = "Auto: 5s";
        }
      });

      // Kickoff
      load();
    </script>
  </body>
</html>
